services:

  # ─────────────────────────────────────────
  # PostgreSQL + pgvector
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_tax_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d # auto-run DDL saat init
    ports:
      - "5432:5432" # expose untuk akses di lokal / DBeaver
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # n8n
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: rag_tax_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Auth
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_BLOCK_ENV_ACCESS_IN_EXPRESSIONS: ${N8N_BLOCK_ENV_ACCESS_IN_EXPRESSIONS}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"

      # Host & Webhook
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}

      # Timezone
      GENERIC_TIMEZONE: Asia/Jakarta
      TZ: Asia/Jakarta

      # Pakai PostgreSQL sebagai database internal n8n
      # (terpisah dari database RAG — gunakan DB name berbeda)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_internal
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # API Keys — diteruskan dari .env ke dalam container n8n
      # Dipanggil di node n8n via: {{ $env.GEMINI_API_KEY }}, dst.
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_INGESTION_MODEL: ${OPENROUTER_INGESTION_MODEL}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL}

    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - C:/data-ingestion:/home/node/.n8n-files # Mengambil data dari folder data-ingestion

volumes:
  postgres_data:
  n8n_data:
